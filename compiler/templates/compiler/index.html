{% load static %}<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚡</text></svg>" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="CodeForge Enterprise - Online Code Compiler & Editor" />
    <meta name="theme-color" content="#0f172a" />
    <title>{{ title|default:"CodeForge | Online Compiler Enterprise" }}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
    <style>
      body {
        font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        margin: 0;
        background: #020617;
      }
      #root { height: 100vh; }
      .app-loader {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        height: 100vh;
        background: #020617;
        color: #94a3b8;
        font-family: 'Inter', sans-serif;
        gap: 16px;
      }
      .app-loader .logo {
        width: 56px;
        height: 56px;
        border-radius: 16px;
        background: linear-gradient(135deg, #6366f1, #a855f7);
        display: flex;
        align-items: center;
        justify-content: center;
        box-shadow: 0 0 30px rgba(99, 102, 241, 0.3);
      }
      .app-loader .logo svg {
        width: 28px;
        height: 28px;
        color: white;
      }
      .app-loader .bar {
        width: 120px;
        height: 3px;
        background: #1e293b;
        border-radius: 3px;
        overflow: hidden;
      }
      .app-loader .bar::after {
        content: '';
        display: block;
        width: 40%;
        height: 100%;
        background: linear-gradient(90deg, #6366f1, #a855f7);
        border-radius: 3px;
        animation: loading 1.2s ease-in-out infinite;
      }
      @keyframes loading {
        0% { transform: translateX(-100%); }
        100% { transform: translateX(350%); }
      }
    </style>
    {% if css_file %}
    <link rel="stylesheet" crossorigin href="{% static css_file %}" />
    {% endif %}
    {% if js_file %}
    <script type="module" crossorigin src="{% static js_file %}"></script>
    {% endif %}
  </head>
  <body>
    <div id="root">
      <div class="app-loader">
        <div class="logo">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="4 17 10 11 4 5"></polyline>
            <line x1="12" y1="19" x2="20" y2="19"></line>
          </svg>
        </div>
        <p style="font-size: 14px; font-weight: 600; letter-spacing: 0.5px;">CodeForge</p>
        <div class="bar"></div>
      </div>
    </div>
  </body>
</html>
