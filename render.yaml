# =============================================================================
# Render Blueprint - Online Compiler Enterprise
# Deploy: Connect GitHub repo -> Render auto-detects this file
# =============================================================================

databases:
  - name: online-compiler-db
    plan: free
    databaseName: online_compiler
    user: compiler_admin
    region: oregon

services:
  # Django Gateway (Docker)
  - type: web
    name: online-compiler-gateway
    plan: free
    runtime: docker
    region: oregon
    dockerfilePath: ./Dockerfile
    dockerContext: .
    healthCheckPath: /health/
    autoDeploy: true
    envVars:
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DJANGO_DEBUG
        value: "False"
      - key: DJANGO_ALLOWED_HOSTS
        value: ".onrender.com,localhost"
      - key: RENDER
        value: "true"
      - key: DATABASE_URL
        fromDatabase:
          name: online-compiler-db
          property: connectionString
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: EXECUTOR_API_KEY
        generateValue: true
      - key: LOG_LEVEL
        value: "WARNING"

  # FastAPI Executor (Docker)
  - type: web
    name: online-compiler-executor
    plan: free
    runtime: docker
    region: oregon
    rootDir: services/executor
    dockerfilePath: ./Dockerfile
    dockerContext: .
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: EXECUTOR_API_KEY
        fromService:
          name: online-compiler-gateway
          type: web
          envVarKey: EXECUTOR_API_KEY
      - key: CODE_EXECUTION_TIMEOUT
        value: "10"
      - key: MAX_OUTPUT_SIZE
        value: "10000"
      - key: LOG_LEVEL
        value: "WARNING"
