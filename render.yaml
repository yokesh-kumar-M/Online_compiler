# =============================================================================
# Render Blueprint - Online Compiler Enterprise
# Frontend runs on Vercel; this Blueprint provisions only the backend.
# Deploy: Render Dashboard -> New -> Blueprint -> connect this repo.
# =============================================================================

databases:
  - name: online-compiler-db
    plan: free
    databaseName: online_compiler
    user: compiler_admin
    region: oregon

services:
  # Django Gateway (Docker) — public API
  - type: web
    name: online-compiler-gateway
    plan: free
    runtime: docker
    region: oregon
    dockerfilePath: ./Dockerfile
    dockerContext: .
    healthCheckPath: /health/
    autoDeploy: true
    envVars:
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DJANGO_DEBUG
        value: "False"
      - key: DJANGO_ALLOWED_HOSTS
        value: ".onrender.com,localhost"
      - key: RENDER
        value: "true"
      - key: DATABASE_URL
        fromDatabase:
          name: online-compiler-db
          property: connectionString
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: EXECUTOR_API_KEY
        generateValue: true
      # Wire the executor service host into the gateway so it can call /execute.
      # Django settings.py prepends https:// when the value has no scheme.
      - key: EXECUTOR_SERVICE_URL
        fromService:
          name: online-compiler-executor
          type: web
          property: host
      # Set these AFTER your first Vercel deploy. Examples:
      #   CORS_ALLOWED_ORIGINS = https://your-app.vercel.app
      #   CSRF_TRUSTED_ORIGINS = https://your-app.vercel.app
      #   FRONTEND_URL         = https://your-app.vercel.app
      - key: CORS_ALLOWED_ORIGINS
        sync: false
      - key: CSRF_TRUSTED_ORIGINS
        sync: false
      - key: FRONTEND_URL
        sync: false
      - key: LOG_LEVEL
        value: "WARNING"

  # FastAPI Executor (Docker) — private code-execution sandbox
  - type: web
    name: online-compiler-executor
    plan: free
    runtime: docker
    region: oregon
    rootDir: services/executor
    dockerfilePath: ./Dockerfile
    dockerContext: .
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: EXECUTOR_API_KEY
        fromService:
          name: online-compiler-gateway
          type: web
          envVarKey: EXECUTOR_API_KEY
      - key: CODE_EXECUTION_TIMEOUT
        value: "10"
      - key: MAX_OUTPUT_SIZE
        value: "10000"
      - key: LOG_LEVEL
        value: "WARNING"
